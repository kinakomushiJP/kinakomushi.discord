        .nav-item { width: 100%; height: 50px; display: flex; align-items: center; padding: 0 22px; color: var(--text-gray); text-decoration: none; transition: 0.3s; pointer-events: auto; }

        /* コンテンツ */

        .section-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 40px; margin-bottom: 60px; backdrop-filter: blur(8px); }
        
        /* 運営カード */
        .member-card { position: relative; display: flex; align-items: center; width: 100%; height: 80px; background: #111214; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); margin-bottom: 12px; }
        .member-avatar { position: relative; z-index: 2; margin-left: 15px; width: 50px; height: 50px; border-radius: 50%; border: 2px solid #1e1f22; }
        .member-info { position: relative; z-index: 2; margin-left: 15px; }
        .member-name { font-size: 1.1rem; font-weight: 800; color: #9b59b6; margin: 0; }
        .member-role { font-size: 0.75rem; color: #b5bac1; margin: 0; }
        .member-banner { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.4; mask-image: linear-gradient(to right, transparent 20%, black 100%); -webkit-mask-image: linear-gradient(to right, transparent 20%, black 100%); }

        /* 入力フォーム */
        .form-input { width: 100%; background: #000; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; color: #fff; margin-bottom: 15px; pointer-events: auto; }
        .submit-btn { background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.3s; pointer-events: auto; }
        .submit-btn:hover { background: var(--accent-blue); color: #fff; }

        @media (max-width: 768px) {
            .side-nav { width: 100%; height: 60px; top: auto; bottom: 0; flex-direction: row; }
            .container { margin: 0 auto; padding-bottom: 100px; }
        }
    </style>

<script>

    // supabase/functions/discord-notify/index.ts
Deno.serve(async (req) => {
  const { record } = await req.json()
  
  const payload = {

    // --- 2. 完璧な背景アニメーション（線・クリック描画・近接線） ---
    const bgCanvas = document.getElementById('bg-canvas');
    const ctx = bgCanvas.getContext('2d');
    let width, height, particles = [];
    let activeLines = [];
    let currentLine = null;
    const mouse = { x: null, y: null };
    const connectionDist = 150;

    function resize() { width = bgCanvas.width = window.innerWidth; height = bgCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

    // クリックで線を引く機能
    window.addEventListener('mousedown', (e) => {
        if (e.clientX < 70) return; 
        currentLine = { start: { x: e.x, y: e.y }, end: { x: e.x, y: e.y }, opacity: 0.6, isFixed: false };
        activeLines.push(currentLine);
    });
    window.addEventListener('mouseup', (e) => {
        if (currentLine) { currentLine.end.x = e.x; currentLine.end.y = e.y; currentLine.isFixed = true; currentLine = null; }
    });

    resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * width; this.y = Math.random() * height;
            this.size = Math.random() * 1.5 + 0.5;
            this.speedX = (Math.random() - 0.5) * 1.2;
            this.speedY = (Math.random() - 0.5) * 1.2;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.init();
        }
        draw() {
            ctx.fillStyle = 'rgba(0, 168, 255, 0.4)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    for (let i = 0; i < 35; i++) particles.push(new Particle());

    function connect(p1, p2, baseOpacity = 1) {
        if (p1.x === null || p2.x === null) return;
        const dx = p1.x - p2.x; const dy = p1.y - p2.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < connectionDist) {
            const opacity = (1 - (dist / connectionDist)) * baseOpacity;
            ctx.strokeStyle = `rgba(0, 168, 255, ${opacity * 0.6})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        }
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);

        // クリックで引いた線の描画
        activeLines.forEach(line => {
            if (!line.isFixed) { line.end.x = mouse.x; line.end.y = mouse.y; }
            else { line.opacity -= 0.01; }
            if (line.opacity > 0) {
                ctx.strokeStyle = `rgba(0, 168, 255, ${line.opacity})`;
                ctx.lineWidth = 1.2;
                ctx.beginPath(); ctx.moveTo(line.start.x, line.start.y); ctx.lineTo(line.end.x, line.end.y); ctx.stroke();
            }
        });
        activeLines = activeLines.filter(l => l.opacity > 0);

        particles.forEach((p, i) => {
            p.update(); p.draw();
            // カーソルとパーティクルの線
            connect(mouse, p);
            // パーティクル同士の線
            for (let j = i + 1; j < particles.length; j++) connect(p, particles[j]);
            // 引いた線とパーティクルの線
            activeLines.forEach(l => { connect(l.start, p, l.opacity); connect(l.end, p, l.opacity); });
        });

        requestAnimationFrame(animate);
    }
    animate();
</script>
